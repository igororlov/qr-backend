spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/qr_backend
    username: qr_user
    password: qr_password
    driver-class-name: org.postgresql.Driver
  mail:
    host: localhost
    port: 1025
    username:
    password:
  jpa:
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:5173}
  mail-from: ${APP_MAIL_FROM:noreply@localhost}
  admin-email: ${APP_ADMIN_EMAIL:admin@example.com}
  admin-password: ${APP_ADMIN_PASSWORD:password}
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-local-dev-secret-local-dev-secret}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8081,http://127.0.0.1:8081}
