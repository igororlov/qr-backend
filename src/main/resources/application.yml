spring:
  application:
    name: qr-backend
  profiles:
    active: local
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/qr_backend}
    username: ${DATABASE_USERNAME:qr_user}
    password: ${DATABASE_PASSWORD:qr_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${PORT:8080}
  address: ${SERVER_ADDRESS:0.0.0.0}

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    no.benidorm.qr: INFO
    org.springframework.security: INFO

app:
  public-base-url: ${APP_PUBLIC_BASE_URL}
  mail-from: ${APP_MAIL_FROM}
  admin-email: ${APP_ADMIN_EMAIL}
  admin-password: ${APP_ADMIN_PASSWORD}
  jwt:
    secret: ${JWT_SECRET}
    expiration: PT8H
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
