spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  forward-headers-strategy: framework

logging:
  level:
    org.hibernate.SQL: INFO

app:
  public-base-url: ${APP_PUBLIC_BASE_URL}
  mail-from: ${APP_MAIL_FROM}
  admin-email: ${APP_ADMIN_EMAIL}
  admin-password: ${APP_ADMIN_PASSWORD}
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
